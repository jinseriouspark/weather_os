name: Deploy Weather Ops preview to GitHub Pages

# 정적 미리보기를 GitHub Pages로 배포 (standalone 레포 루트 레이아웃).
# - index.html: 실제 대시보드 (백엔드 없으면 데모 데이터로 자동 폴백)
# - preview.html: 설치 없이 도는 단독 데모
# ⚠️ 사전 준비(한 번만): Settings → Pages → Source = "GitHub Actions".
# ⚠️ 정적이라 팀 로그인/실시간 API는 미동작 (Render·로컬 npm start 에서).

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r public/* _site/
          cp demo.html _site/preview.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true # Pages 미활성 레포에서 자동 활성화 시도
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
