<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Ops — 팀 현황</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">👥 팀 현황</div>
    <div class="controls">
      <a href="index.html" class="navlink" title="대시보드">⛅ 대시보드</a>
      <span id="who" class="navlink" style="cursor:default"></span>
      <button id="logoutBtn" title="로그아웃" class="hidden">로그아웃</button>
    </div>
  </header>

  <main id="app">
    <!-- 로그인/가입 -->
    <section id="authView" class="hidden">
      <div class="panel-card">
        <h2 id="authTitle">로그인</h2>
        <div id="authError" class="form-error"></div>
        <input id="username" placeholder="사용자명 (3자 이상)" autocomplete="username" />
        <input id="password" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" />
        <button id="authSubmit" class="btn-primary">로그인</button>
        <button id="authToggle" class="btn-ghost">계정이 없나요? 가입</button>
      </div>
    </section>

    <!-- 팀 없음: 생성/참여 -->
    <section id="teamSetup" class="hidden">
      <div class="panel-card">
        <h2>팀 만들기</h2>
        <input id="teamName" placeholder="팀 이름" />
        <button id="createTeam" class="btn-primary">팀 생성</button>
      </div>
      <div class="panel-card">
        <h2>팀 참여</h2>
        <input id="joinCode" placeholder="초대 코드" />
        <button id="joinTeam" class="btn-primary">참여</button>
      </div>
    </section>

    <!-- 팀 현황 -->
    <section id="teamView" class="hidden">
      <div class="panel-card consent">
        <h2 id="teamTitle"></h2>
        <div class="invite">초대 코드: <code id="inviteCode"></code></div>
        <hr />
        <div class="consent-box">
          <label class="switch-row">
            <input type="checkbox" id="shareToggle" />
            <span><b>내 위치 공유</b></span>
          </label>
          <p class="consent-text">
            ⚠️ 켜면 이 기기의 현재 위치(GPS)가 <b>같은 팀 멤버에게만</b> 공유됩니다.
            위치는 최신 1건만 저장되고 이동 경로는 기록하지 않으며, 끄면 즉시 삭제됩니다.
            동의하는 경우에만 켜세요.
          </p>
          <div id="shareStatus" class="share-status"></div>
        </div>
      </div>

      <h2 class="section-title">공유 중인 멤버</h2>
      <section id="memberList" class="sources"></section>

      <div class="panel-card danger">
        <button id="deleteAcct" class="btn-ghost danger-btn">계정 및 내 모든 데이터 삭제</button>
      </div>
    </section>
  </main>

  <script src="presets.js"></script>
  <script src="team.js"></script>
</body>
</html>
