<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Ops — 업무용 날씨 한눈에</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- PWA: 홈 화면 설치 + 오프라인 -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1a212b" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Weather Ops" />
</head>
<body>
  <div id="loadbar" aria-hidden="true"></div>
  <header class="topbar">
    <div class="brand"><img class="brand-ico" src="icons/icon-192.png" alt="" width="22" height="22" /> <span class="brand-name">Weather Ops</span><span id="navtitle" class="navtitle"></span></div>
    <div class="controls">
      <select id="presetSelect" title="업무 프리셋"></select>
      <select id="citySelect" title="지역"></select>
      <button id="geoBtn" title="현재 위치 사용"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></button>
      <button id="refreshBtn" title="새로고침"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></button>
      <button id="customizeBtn" title="대시보드 편집"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/></svg></button>
      <button id="installBtn" class="hidden" title="앱 설치">📲 설치</button>
      <a href="team.html" class="navlink" title="팀 현황"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> 팀</a>
    </div>
  </header>

  <!-- 위치+바람 지도: 화면에 고정된 배경 (내용이 그 위로 스크롤) -->
  <div id="hero-map" class="hero-map" aria-hidden="true"></div>
  <div class="hero-scrim" aria-hidden="true"></div>

  <main id="app">
    <!-- 히어로: 고정 지도 위에 큰 온도/판정 오버레이 (스크롤하면 글자만 압축돼 위로) -->
    <section id="hero">
      <div class="hero-body">
        <section id="verdict" class="verdict"></section>
        <div id="warnbar" class="warnbar"></div>
      </div>
      <div class="hero-hint" aria-hidden="true"><span></span></div>
    </section>

    <!-- 시트: 불투명 배경으로 지도 위를 덮으며 올라옴 -->
    <div class="sheet">
      <h2 class="section-title">바람</h2>
      <section id="windlead" class="windlead"></section>
      <h2 class="section-title">핵심 지표</h2>
      <section id="widgets" class="widgets"></section>

      <div class="section-head" id="sources-head">
        <h2 class="section-title">출처별 비교</h2>
        <label class="colorby-label">색상 기준
          <select id="colorBySelect" title="박스 색을 어떤 지표 기준으로 칠할지"></select>
        </label>
      </div>
      <section id="sources" class="sources"></section>

      <section id="weekly-wrap" class="hidden">
        <h2 class="section-title">주간 예보 · 3~10일 후 (기상청 중기)</h2>
        <div id="weekly" class="weekly"></div>
      </section>
      <footer class="foot">
        <span id="updated"></span>
        <div id="meta" class="meta"></div>
      </footer>
    </div>
  </main>

  <!-- 온보딩 / 커스터마이즈 모달 -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="presets.js"></script>
  <script src="app.js"></script>
</body>
</html>
