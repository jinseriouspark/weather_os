<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 페이지 핀치줌 비활성(지도 위 핀치가 화면을 픽셀 확대하지 않게) → 지도 확대는 +/− 버튼으로 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CloudsCode — 날씨 코드</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- PWA: 홈 화면 설치 + 오프라인 -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1a212b" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CloudsCode" />
</head>
<body>
  <div id="loadbar" aria-hidden="true"></div>
  <header class="topbar">
    <button id="locBtn" class="loc-btn" type="button" title="지역 변경">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="locName" class="loc-name">CloudsCode</span>
      <svg class="ico caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="top-actions">
      <select id="presetSelect" title="업무 프리셋"></select>
      <button id="refreshBtn" title="새로고침"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></button>
    </div>
    <!-- 지역 검색은 상시 노출 대신 바텀시트로 (모바일 패턴) -->
    <div id="citySearchWrap" class="citysearch hidden">
      <input id="citySearch" type="search" inputmode="search" placeholder="지역 검색" autocomplete="off" title="지역 검색" />
      <div id="cityResults" class="city-results hidden" role="listbox"></div>
    </div>
    <!-- 접힘 타이틀(스크롤 시) -->
    <span id="navtitle" class="navtitle"></span>
    <button id="geoBtn" class="hidden" title="현재 위치"></button>
    <button id="installBtn" class="hidden" title="앱 설치">📲 설치</button>
  </header>

  <!-- 위치+바람 지도: 화면에 고정된 배경 (내용이 그 위로 스크롤) -->
  <div id="hero-map" class="hero-map" aria-hidden="true"></div>
  <div class="hero-scrim" aria-hidden="true"></div>

  <main id="app">
    <!-- 히어로: 고정 지도 위에 큰 온도/판정 오버레이 (스크롤하면 글자만 압축돼 위로) -->
    <section id="hero">
      <div class="hero-body">
        <section id="verdict" class="verdict"></section>
        <div id="warnbar" class="warnbar"></div>
      </div>
      <div class="hero-hint" aria-hidden="true"><span></span></div>
    </section>

    <!-- 바람 지도 리빌: 히어로 글자가 밀려 올라간 뒤 '처음 보이는' 깨끗한 바람 지도 구간
         (배경 고정 지도가 그림자 모드에서 벗겨지며 선명하게 드러남) -->
    <div class="map-reveal">
      <div class="map-reveal-label" aria-hidden="true">바람 지도 · +／− 확대 · 드래그 이동</div>
    </div>
    <!-- 확대/축소: Windy를 더 깊은 줌으로 다시 로드 → 시·군·구가 자세히 보인다 -->
    <div id="mapZoom" class="map-zoom" aria-hidden="true">
      <button id="mapZoomIn" type="button" aria-label="지도 확대">＋</button>
      <button id="mapZoomOut" type="button" aria-label="지도 축소">−</button>
    </div>
    <!-- 지도 조작 구간(그림자 걷힌 뒤)에서만 뜨는 '아래로' 버튼: 확대 중에도 시트로 이동 -->
    <button id="mapNext" class="map-next" type="button">아래로 ↓</button>

    <!-- 시트: 불투명 배경으로 지도 위를 덮으며 올라옴. 탭으로 내용 분리 -->
    <div class="sheet">
      <!-- ── 탭: 날씨 (기본) ── -->
      <div class="tabpanel" data-tab="weather">
        <h2 class="section-title">바람</h2>
        <section id="windlead" class="windlead"></section>
        <h2 class="section-title">핵심 지표</h2>
        <section id="widgets" class="widgets"></section>
        <section id="weekly-wrap" class="hidden">
          <h2 class="section-title" id="weekly-title">주간 예보</h2>
          <div id="weekly" class="weekly"></div>
        </section>
      </div>

      <!-- ── 탭: 비행 (드론·항덕) ── -->
      <div class="tabpanel hidden" data-tab="fly">
        <section id="flightcheck" class="flightcheck"></section>
        <section id="timeline" class="timeline hidden"></section>
        <section id="spots" class="spots">
          <button id="spotsBtn" class="spots-btn" type="button">🛩 내 주변 비행장 찾기</button>
          <div id="spotsList" class="spots-list hidden"></div>
        </section>
        <section id="cockpit" class="cockpit"></section>
        <div class="section-head" id="sources-head">
          <h2 class="section-title">출처별 비교</h2>
          <label class="colorby-label">색상
            <select id="colorBySelect" title="박스 색 기준"></select>
          </label>
        </div>
        <section id="sources" class="sources"></section>
      </div>

      <!-- ── 탭: 기록 (내 드론 · 비행 로그) ── -->
      <div class="tabpanel hidden" data-tab="log">
        <section id="mydrones" class="mydrones"></section>
        <section id="flightlog" class="flightlog"></section>
        <div class="settings-row">
          <button id="customizeBtn" class="ghost-line" type="button">⚙︎ 대시보드 편집</button>
          <a href="privacy.html" class="ghost-line">개인정보처리방침</a>
        </div>
      </div>

      <footer class="foot">
        <span id="updated"></span>
        <div id="meta" class="meta"></div>
      </footer>
    </div>
  </main>

  <!-- 바텀 탭바 (엄지 영역 · 주 내비게이션) -->
  <nav id="tabbar" class="tabbar" aria-label="주 메뉴">
    <button class="tab" data-go="weather" aria-current="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg><span>날씨</span></button>
    <button class="tab" data-go="fly">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5a2.1 2.1 0 0 0-3-3L13 8 4.8 6.2a.5.5 0 0 0-.5.8L9 11l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 4.7 4.7a.5.5 0 0 0 .8-.5Z"/></svg><span>비행</span></button>
    <button class="tab" data-go="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h11M8 12h11M8 18h11"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg><span>기록</span></button>
  </nav>

  <!-- 온보딩 / 커스터마이즈 모달 -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- 바텀 시트 (지역검색·입력·액션 — 시스템 prompt/alert 대체) -->
  <div id="bsheet" class="bsheet hidden" role="dialog" aria-modal="true">
    <div class="bsheet-scrim"></div>
    <div class="bsheet-card"><div id="bsheetBody"></div></div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="presets.js"></script>
  <script src="app.js"></script>
</body>
</html>
